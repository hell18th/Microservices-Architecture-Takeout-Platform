spring:
  application:
    name: shop-server
  profiles:
    active: dev
    # 激活的环境（开发环境）
  main:
    allow-circular-references: true
    # 允许Bean之间的循环依赖
  cloud:
    nacos:
      server-addr: ${sky.nacos.server-addr}
  data:
    redis:
      host: ${sky.redis.host}
      port: ${sky.redis.port}
      password: ${sky.redis.password}

server:
  port: 8094
  # 项目启动后占用的端口号

